<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Builder</title>

      <link rel="icon" type="image/png" href="WhatsApp Image 2026-07-09 at 10.45.53-modified.png">
<link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="builder-container">

<div class="left-panel">

<h2>Editor Website</h2>

<input type="text" id="title" placeholder="Judul">

<textarea id="message" placeholder="Tulis pesan..."></textarea>

<input type="file" accept="image/*,video/*">

<input type="file" accept="audio/*">

<select id="game">
<option>Tangkap Love</option>
<option>Tangkap Awan</option>
<option>Tebak Tebakan</option>
<option>Tekan Icon</option>
</select>

<select id="theme">
<option>Pink Pastel</option>
<option>Bubble Gum</option>
<option>Lavender</option>
<option>Mint</option>
</select>

<button id="saveBtn">Save Website</button>

</div>

<div class="preview-panel">

<h1 id="previewTitle">Judul Website</h1>

<p id="previewMessage">Preview pesan...</p>

</div>

</div>

<script src="builder.js"></script>

</body>
</html>
